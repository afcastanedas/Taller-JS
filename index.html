<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Prestaciones</title> 
    <script   src="taller.js" defer></script>
</head>    
<body>
    <h1>Simulador</h1>
    <button id="btn">Validar</button>
    <p id="mensaje"></p>

    <label for="nombre">Ingresa tu Nombre:</label>
    <input type="text" id="nombre" name="nombre" minlength="3" maxlength="80" required>

    <label for="edad">Ingresa tu Edad:</label>
    <input type="number" id="edad" name="edad" min="1" max="130" required>

    <label for="numero_de_documento">Ingresa tu Numero de Documento:</label>
    <input type="number" id="numero_de_documento" required>

    <label for="tipo_de_documento">Tipo de documento:</label>
    <select id="tipo_de_documento" name="tipo_de_documento" required>
        <option value="">Seleccione</option>
        <option value="RC">RC - Registro Civil</option>
        <option value="TI">TI - Tarjeta de Identidad</option>
        <option value="CC">CC - Cédula de Ciudadanía</option>
        <option value="CE">CE - Cédula de Extranjería</option>
        <option value="PP">PP - Pasaporte</option>
    </select>

    <div id="formularioSalario" style="display: none;">


        <label for="salario">Ingresa tu Salario:</label>
        <input type="number" id="salario" min="0"required>

        <label for="comisiones">Comisiones:</label>
        <input type="number" id="comisiones" min="0" value="0">

        <label for="total_de_horas_extras">Total de Horas Extras:</label>
        <input type="number" id="total_de_horas_extras" min="0" value="0">

        <label for="niveles_de_riesgo">Nivel de Riesgo:</label>
        <select id="niveles_de_riesgo">
            <option value="1">0.522</option>
            <option value="2">1.044</option>
            <option value="3">2.436</option>
            <option value="4">4.350</option>
            <option value="5">6.960</option>
        </select>
        <button id="btnCalcular" type="button">Calcular obligaciones</button>   
    </div>    

    <div id="formularioPension" style="display: none;">
        <h2>Información de pensión</h2>

        <label for="mesadaPensional">Mesada pensional:</label>
        <input type="number" id="mesadaPensional" min="0">

        <button id="btnPension" type="button">Calcular pensión</button>
    </div>

    <div id="resultados"></div>
</body>
</html>
